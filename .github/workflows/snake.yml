name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: taruntechbs-code
          outputs: |
            dist/snake.svg

      - name: Commit snake
        run: |
          git config --global user.name "taruntechbs-code"
          git config --global user.email "actions@github.com"
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/taruntechbs-code/taruntechbs-code.git repo
          cd repo
          mkdir -p dist
          cp -r ../dist/* dist/
          git add dist/snake.svg
          git commit -m "update snake" || echo "no changes"
          git push
